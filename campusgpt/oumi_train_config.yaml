model:
  model_name: "Qwen/Qwen2.5-0.5B-Instruct"
  torch_dtype_str: "float32"
  trust_remote_code: true
  device_map: "cpu"


data:
  train:
    datasets:
      - dataset_name: "text_sft"
        dataset_path: "dataset/oumi_train_data.jsonl"
        split: "train"

training:
  trainer_type: "TRL_SFT"
  use_peft: true
  output_dir: "campusgpt/fine_tuned_model"
  num_train_epochs: 15
  learning_rate: 2.0e-4
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  logging_steps: 5
  save_steps: 100
  dataloader_num_workers: 0
  enable_wandb: false

peft:
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.0
  lora_target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  peft_save_mode: "ADAPTER_ONLY"

